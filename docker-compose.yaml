services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dent-alp-os
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://dental.royalfnb.com}
      - SEED_DB=${SEED_DB:-false}
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dental-net

  db:
    image: postgres:16-alpine
    container_name: dent-alp-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: dental_db
      POSTGRES_USER: dental_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dental_user -d dental_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - dental-net

volumes:
  pgdata:

networks:
  dental-net:
    driver: bridge
